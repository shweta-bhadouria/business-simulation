<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Startup Strategy Simulation - Restored</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#f8fafc;color:#0f172a}.hero{background:linear-gradient(135deg,#020617,#0f172a,#172554);color:white;padding:28px}.wrap{max-width:1240px;margin:auto}.row{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.grid{display:grid;gap:18px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}.layout{display:grid;grid-template-columns:1.65fr 1fr;gap:22px;padding:22px}.card{background:white;border:1px solid #e2e8f0;border-radius:20px;box-shadow:0 2px 10px #0f172a0a}.pad{padding:20px}.badge{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;background:#f1f5f9;color:#334155}.blue{background:#dbeafe;color:#1d4ed8}.green{background:#d1fae5;color:#047857}.amber{background:#fef3c7;color:#92400e}.purple{background:#f3e8ff;color:#6b21a8}.red{background:#ffe4e6;color:#9f1239}.btn{border:0;border-radius:12px;background:#0f172a;color:white;padding:11px 15px;font-weight:700;cursor:pointer}.btn.bluebtn{background:#2563eb}.btn.greenbtn{background:#059669}.btn.amberbtn{background:#d97706}.btn.light{background:white;color:#0f172a;border:1px solid #cbd5e1}.input,.select{height:42px;border:1px solid #cbd5e1;border-radius:10px;padding:0 10px}.muted{color:#64748b}.small{font-size:13px}.metric{border:1px solid #e2e8f0;border-radius:15px;padding:13px}.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:10px}.fill{height:100%;background:#2563eb}.option{cursor:pointer}.option:hover,.option.sel{border-color:#2563eb;background:#eff6ff}.box{border-radius:15px;padding:14px;margin:12px 0}.optionTitle{font-size:18px;font-weight:800}.tabs{display:flex;gap:6px;background:#e2e8f0;padding:5px;border-radius:15px;margin-bottom:14px}.tab{flex:1;text-align:center;padding:10px;border-radius:11px;font-weight:700;cursor:pointer}.tab.on{background:white}.hide{display:none}.list{max-height:420px;overflow:auto}.item{border:1px solid #e2e8f0;border-radius:14px;padding:13px;margin:10px 0}.score{font-size:32px;font-weight:900}.login{min-height:100vh;background:linear-gradient(135deg,#020617,#0f172a,#172554);color:white;padding:40px 22px}.login .card{background:#ffffff17;color:white;border-color:#ffffff2a}.login .input{width:100%;margin-top:10px}.dark{background:#020617;color:white}.dark .muted{color:#cbd5e1}@media(max-width:900px){.layout,.g2,.g3,.g4{grid-template-columns:1fr}.hero h1{font-size:30px}}
</style></head><body><div id="app"></div><script>
const ADMIN='ADMIN2026', metrics=['cash','revenue','customer','morale','brand','compliance','future'];
const labels={cash:'Cash Position',revenue:'Revenue Growth',customer:'Customer Satisfaction',morale:'Team Morale',brand:'Brand Reputation',compliance:'Compliance & Governance',future:'Future Readiness'};
const short={cash:'Cash',revenue:'Revenue',customer:'Customer',morale:'Morale',brand:'Brand',compliance:'Compliance',future:'Future'};
const init={cash:75,revenue:75,customer:75,morale:75,brand:75,compliance:75,future:75};
const rounds=[
{id:1,title:'Market Risk & Product Fitment',scenario:'A well-funded competitor enters with aggressive pricing. Lead conversions drop and the sales team pushes discounts.',options:[['A','Reduce Pricing','Match competitor pricing to retain customers.',{cash:-10,revenue:12,customer:5,brand:-3},'Pricing Pressure',{revenue:-5},'Discounting protects short-term revenue but trains the market to expect lower pricing.'],['B','Launch Premium Offering','Differentiate through premium service and quality.',{cash:-8,revenue:6,customer:-5,brand:10},'Premium Brand',{brand:5},'Premium positioning compounds as customers associate the company with quality and trust.'],['C','Invest in Customer Experience','Improve onboarding, service and customer support.',{cash:-8,revenue:2,customer:12,brand:6},'Customer Trust',{customer:5},'Better customer experience improves retention, referrals and confidence over time.']]},
{id:2,title:'Cash Flow & Going Concern',scenario:'Customer collections slow. Sales remain healthy but cash reserves reduce rapidly.',options:[['A','Working Capital Loan','Borrow funds to continue growth.',{cash:15,revenue:6,brand:-2},'Working Capital Loan',{cash:-10},'Borrowing allows growth now, but repayment reduces future flexibility.'],['B','Slow Expansion','Delay expansion to preserve cash.',{cash:10,revenue:-5,compliance:4},'Financial Discipline',{cash:5},'Disciplined expansion creates resilience when the market becomes uncertain.'],['C','Delay Technology Investment','Preserve cash by postponing technology upgrades.',{cash:12,future:-12},'Technology Debt',{future:-5},'Deferred technology work compounds into slower execution and reduced readiness.']]},
{id:3,title:'Reputation Risk',scenario:'A dissatisfied customer posts a complaint on social media that gains attention.',options:[['A','Public Apology & Compensation','Publicly acknowledge the mistake and compensate the customer.',{cash:-6,customer:10,brand:12},'Customer Confidence',{brand:3,customer:3},'Owning the issue visibly strengthens customer confidence and brand trust.'],['B','Resolve Privately','Resolve directly with the customer without public communication.',{customer:8,brand:-3},'Media Doubt',{brand:-3},'Private resolution fixes the customer issue but leaves public uncertainty unresolved.'],['C','Leadership Communication','Founder openly communicates corrective actions.',{brand:8,morale:8},'Trusted Leadership',{morale:5},'Transparent leadership calms teams and stakeholders during ambiguity.']]},
{id:4,title:'Technology & Knowledge Upgradation',scenario:'Competitors are adopting AI and automation. Budget allows only one strategic investment.',options:[['A','Invest in Technology','Upgrade AI and automation.',{cash:-12,revenue:3,future:18},'Digital Advantage',{revenue:5},'Technology capability improves productivity and creates future revenue opportunities.'],['B','Invest in Employee Learning','Upskill employees.',{cash:-8,morale:10,future:12},'Learning Culture',{morale:5,future:5},'A learning culture compounds because people keep adapting after the investment.'],['C','Balanced Investment','Invest moderately in both.',{cash:-10,revenue:3,morale:5,future:8},'Balanced Capability',{future:3},'Balanced investment avoids overconcentration and builds moderate capability.']]},
{id:5,title:'Compliance & Governance',scenario:'A surprise regulatory audit identifies governance gaps.',options:[['A','Strong Governance','Invest in governance systems and SOPs.',{cash:-10,brand:5,compliance:18},'Audit Ready',{compliance:5},'Strong governance is expensive upfront but protects against future shocks.'],['B','Critical Fixes Only','Resolve only mandatory issues.',{cash:-4,compliance:7},'Critical Fixes',{},'Minimum fixes reduce immediate risk but do not create durable advantage.'],['C','Growth First','Continue prioritising business growth.',{revenue:12,compliance:-15},'Governance Debt',{brand:-5},'Ignoring governance may boost growth, but governance debt erodes trust.']]},
{id:6,title:'External Stakeholder Management',scenario:'A partner generating 35% of business demands exclusivity.',options:[['A','Accept Exclusivity','Accept their terms.',{cash:5,revenue:12,brand:-2},'Dependency Risk',{revenue:3},'Exclusivity boosts near-term revenue but increases dependence.'],['B','Diversify Partners','Build additional partners.',{revenue:-5,brand:6,future:8},'Business Resilience',{revenue:3},'Diversification hurts short-term momentum but builds resilience.'],['C','Negotiate','Reach a balanced agreement.',{cash:2,revenue:5,brand:5},'Relationship Builder',{brand:3},'Balanced stakeholder management strengthens relationships without surrendering control.']]},
{id:7,title:'Leadership & Emotional Management',scenario:'Your highest-performing employee resigns unexpectedly.',options:[['A','Retention Bonus','Increase compensation for key employees.',{cash:-8,customer:5,morale:12},'High Fixed Cost',{cash:-5},'Retention spending stabilizes the team but increases fixed cost pressure.'],['B','Hire Quickly','Recruit replacements immediately.',{revenue:5,future:5,morale:-3},'Talent Pipeline',{revenue:5},'Fast hiring maintains execution velocity but may create morale concerns.'],['C','Leadership Development','Build leaders and strengthen culture.',{morale:10,brand:6,future:8},'High Trust Culture',{morale:5,brand:3},'Leadership development compounds through trust, ownership and reduced key-person dependency.']]}
];
const risks=[
{id:1,title:'Industry Rumour',narrative:'A fake message claims your company is shutting down.',def:{revenue:-8,brand:-12,morale:-5},prot:[['Premium Brand',{brand:7},'Premium Brand reduces reputational damage.'],['Customer Trust',{revenue:5},'Customer Trust reduces revenue loss because customers are less likely to churn.'],['Trusted Leadership',{morale:5},'Trusted Leadership protects morale during ambiguity.']]},
{id:2,title:'AI Disruption',narrative:'Competitors launch AI-powered services.',def:{future:-12,revenue:-6},prot:[['Digital Advantage',{future:12,revenue:11},'Digital Advantage neutralizes the penalty and creates revenue upside.'],['Learning Culture',{future:7},'Learning Culture reduces readiness loss because people adapt faster.'],['Balanced Capability',{future:6,revenue:3},'Balanced Capability halves disruption.']]},
{id:3,title:'Economic Slowdown',narrative:'Customer demand drops significantly.',def:{cash:-10,revenue:-10},prot:[['Financial Discipline',{cash:10,revenue:5},'Financial Discipline protects cash and reduces revenue loss.'],['Working Capital Loan',{cash:-5},'Working Capital Loan adds repayment stress.']]},
{id:4,title:'Surprise Regulatory Inspection',narrative:'Authorities conduct an inspection.',def:{compliance:-15,brand:-6},prot:[['Audit Ready',{compliance:15,brand:11},'Audit Ready neutralizes compliance penalty and strengthens brand.'],['Critical Fixes',{compliance:8},'Critical Fixes reduce compliance loss.'],['Governance Debt',{compliance:-8,brand:-5},'Governance Debt increases penalties.']]},
{id:5,title:'Major Partner Exit',narrative:'Largest referral partner exits.',def:{revenue:-12,cash:-5},prot:[['Business Resilience',{revenue:11,cash:4},'Business Resilience makes the exit almost immaterial.'],['Relationship Builder',{revenue:7},'Relationship Builder reduces revenue loss.'],['Dependency Risk',{revenue:-8},'Dependency Risk increases revenue loss.']]}
];
const S={teams:[team('Team Alpha','ALPHA'),team('Team Beta','BETA')],session:null,active:null,tab:'play',pick:null,error:'',revealAdmin:false};
function team(name,code){return {id:crypto.randomUUID?crypto.randomUUID():Math.random()+'',name,code,metrics:{...init},visible:null,show:false,phase:1,round:0,risk:0,decisions:[],assets:[],delays:[],hist:[],riskHist:[],trend:[],pending:false,phase1:false,delayed:false,complete:false,lastLT:null,lastRisk:null}}
const $=id=>document.getElementById(id), fmt=o=>Object.entries(o||{}).map(([k,v])=>`${short[k]} ${v>0?'+':''}${v}`).join(', '), score=m=>Object.values(m||{}).reduce((a,b)=>a+b,0), cp=o=>JSON.parse(JSON.stringify(o));
function appTeam(){let id=S.session?.mode==='admin'?(S.active||S.teams[0].id):S.session?.team;return S.teams.find(t=>t.id===id)||S.teams[0]} function impact(m,o){let n={...m};Object.entries(o||{}).forEach(([k,v])=>n[k]=Math.max(0,Math.min(100,(n[k]||0)+v)));return n} function snap(t,label,m){t.visible={...m};t.show=true;t.trend.push({label,score:score(m),...cp(m)})}
function login(mode){if(mode==='team'){let c=$('code').value.trim().toUpperCase(),t=S.teams.find(x=>x.code===c);if(!t){S.error='Invalid team code';return render()}S.session={mode:'team',team:t.id}}else{if($('pin').value.trim()!==ADMIN){S.error='Invalid admin PIN';return render()}S.session={mode:'admin'};S.active=S.teams[0].id}S.error='';render()}
function logout(){S.session=null;S.tab='play';S.pick=null;render()} function addTeam(){let n=$('newTeam').value.trim()||`Team ${S.teams.length+1}`,base=n.replace(/[^a-z0-9]/gi,'').slice(0,8).toUpperCase()||`TEAM${S.teams.length+1}`,c=base,i=2;while(S.teams.some(t=>t.code===c))c=base+i++;let t=team(n,c);S.teams.push(t);S.active=t.id;render()} function reset(){S.teams=[team('Team Alpha','ALPHA'),team('Team Beta','BETA')];S.session=null;render()}
function choose(x){S.pick=x;render()} function confirmChoice(){let t=appTeam(),r=rounds[t.round],o=r.options.find(a=>a[0]===S.pick); if(!o)return; let im=o[3]; t.metrics=impact(t.metrics,im); t.decisions.push({round:r.id,opt:o[0],title:o[1],decision:o[2],immediate:im,asset:o[4],delayed:o[5],explain:o[6]}); t.assets.push(o[4]); t.delays.push({round:r.id,asset:o[4],impact:o[5],explain:o[6],applied:false}); t.hist.push({type:'Immediate',label:`Round ${r.id}: ${o[1]}`,impact:im,explain:o[2],score:score(t.metrics)}); t.pending=true; S.pick=null; render()}
function nextRound(){let t=appTeam();t.pending=false;if(t.round<6)t.round++;else{t.round=7;t.phase1=true;snap(t,'After Phase 1',t.metrics)}render()}
function revealLT(){let t=appTeam(),i=t.delays.findIndex(d=>!d.applied); if(i<0)return; let d=t.delays[i],before=cp(t.metrics); t.metrics=impact(t.metrics,d.impact); d.applied=true; t.delayed=t.delays.every(x=>x.applied); t.lastLT={...cp(d),before,after:cp(t.metrics),score:score(t.metrics)}; t.hist.push({type:'Long-Term',label:`Round ${d.round}: ${d.asset}`,impact:d.impact,explain:d.explain,score:score(t.metrics)}); snap(t,`LT R${d.round}`,t.metrics); render()}
function startPhase2(){let t=appTeam();t.phase=2;t.lastLT=null;render()}
function revealRisk(){let t=appTeam(),r=risks[t.risk],before=cp(t.metrics),afterDef=impact(t.metrics,r.def),final=cp(afterDef),tr=[]; r.prot.forEach(p=>{if(t.assets.includes(p[0])){final=impact(final,p[1]);tr.push({asset:p[0],impact:p[1],note:p[2]})}}); t.metrics=final; let rec={title:r.title,narrative:r.narrative,def:r.def,triggered:tr,afterDef,finalScore:score(final)}; t.riskHist.push(rec); t.lastRisk={...rec,before,final,cardId:r.id}; t.hist.push({type:'Risk Card',label:r.title,impact:r.def,explain:tr.length?`${tr.length} resilience modifier(s) activated.`:'No resilience modifiers activated.',score:score(final)}); snap(t,`Risk ${r.id}`,final); render()}
function nextRisk(){let t=appTeam();t.lastRisk=null;if(t.risk<4)t.risk++;else t.complete=true;render()}
function exportReport(){let txt=S.teams.map((t,i)=>`# ${i+1}. ${t.name}\n\nCode: ${t.code}\nScore: ${score(t.visible||t.metrics)} / 700\n\nDecisions:\n${t.decisions.map(d=>`- R${d.round}: ${d.title}`).join('\n')||'Pending'}\n\nLong-term:\n${t.delays.filter(d=>d.applied).map(d=>`- R${d.round}: ${d.asset}: ${fmt(d.impact)}`).join('\n')||'Pending'}\n\nRisks:\n${t.riskHist.map(r=>`- ${r.title}: ${r.triggered.length?r.triggered.map(x=>x.asset).join(', '):'No protection'}`).join('\n')||'Pending'}\n`).join('\n---\n'); dl('simulation-report.md',txt,'text/markdown')} function exportHTML(){dl('startup-strategy-simulation-restored.html',document.documentElement.outerHTML,'text/html')} function dl(n,t,type){let b=new Blob([t],{type}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}
function dashboard(t){let m=t.visible||(S.session.mode==='admin'?t.metrics:null),show=S.session.mode==='admin'||(t.show&&t.visible); if(!show)return `<div class="card pad"><h2>Business Health Hidden</h2><p class="muted">Dashboard unlocks after Phase 1.</p></div>`; return `<div class="card"><div class="pad row"><div><b>Active Team: ${t.name}</b><h2>Business Health Dashboard</h2><p class="muted small">Updated at reveal points only.</p></div><div class="box ${score(m)>=520?'green':'amber'}"><div class="small"><b>OVERALL BUSINESS HEALTH</b></div><div class="score">${score(m)} <span class="small">/ 700</span></div></div></div><div class="pad grid g4">${metrics.map(k=>`<div class="metric"><div class="row"><span class="small muted">${labels[k]}</span><b>${m[k]}</b></div><div class="bar"><div class="fill" style="width:${m[k]}%"></div></div></div>`).join('')}</div></div>`}
function play(t){let r=rounds[t.round]; if(!t.phase1&&r){if(t.pending){let d=t.decisions.at(-1);return `<div class="card pad"><span class="badge blue">Round ${d.round} Decision Locked</span><h2>${d.title}</h2><p>${d.decision}</p><div class="box blue">Decision recorded. Impact will be revealed after all Phase 1 rounds.</div><button class="btn bluebtn" onclick="nextRound()">Next Round →</button></div>`}return `<div class="card pad"><div class="row"><span class="badge blue">Phase 1 · Round ${r.id} of 7</span><span class="badge">≈ 6 months</span></div><h2>${r.title}</h2><div class="box">${r.scenario}</div><div class="grid g3">${r.options.map(o=>`<div class="card pad option ${S.pick===o[0]?'sel':''}" onclick="choose('${o[0]}')"><span class="badge">${o[0]}</span><div class="optionTitle">${o[1]}</div><p class="small muted">${o[2]}</p></div>`).join('')}</div><div class="row" style="margin-top:15px"><p class="small muted">Select one strategic choice.</p><button class="btn bluebtn" ${!S.pick?'disabled style="opacity:.5"':''} onclick="confirmChoice()">Confirm Decision</button></div></div>`}
 if(t.phase1&&t.phase===1){let pending=t.delays.find(d=>!d.applied);return `<div class="card pad"><span class="badge purple">End of Phase 1</span><h2>Long-Term Impact Reveal</h2><p class="muted">Reveal each delayed consequence. The final impact stays visible before Phase 2 starts.</p>${t.lastLT?`<div class="box green"><h3>Revealed: Round ${t.lastLT.round} — ${t.lastLT.asset}</h3><p><b>Impact:</b> ${fmt(t.lastLT.impact)||'No score change'}</p><p>${t.lastLT.explain}</p><p><b>Updated Business Health:</b> ${t.lastLT.score} / 700</p></div>`:''}<div>${t.delays.map(d=>`<div class="item"><div class="row"><b>Round ${d.round}: ${d.asset}</b>${d.applied?'<span class="green badge">Applied</span>':'<span class="badge">Pending</span>'}</div>${d.applied?`<p class="small">${fmt(d.impact)||'No score change'}</p><p class="small muted">${d.explain}</p>`:''}</div>`).join('')}</div>${pending?`<button class="btn greenbtn" onclick="revealLT()">Reveal Next Long-Term Impact</button>`:`<button class="btn bluebtn" onclick="startPhase2()">Next: Start Phase 2 →</button>`}</div>`}
 if(t.phase===2&&!t.complete){if(t.lastRisk)return `<div class="card pad"><span class="badge amber">Risk Impact Revealed</span><h2>${t.lastRisk.title}</h2><p>${t.lastRisk.narrative}</p><div class="box amber"><b>Default Impact:</b> ${fmt(t.lastRisk.def)}<br><b>Score after default:</b> ${score(t.lastRisk.afterDef)} / 700</div><div class="box ${t.lastRisk.triggered.length?'green':'red'}"><h3>Resilience Check</h3>${t.lastRisk.triggered.length?t.lastRisk.triggered.map(p=>`<p><b>${p.asset}</b>: ${fmt(p.impact)} — ${p.note}</p>`).join(''):'<p>No protection activated. The team absorbed the full shock.</p>'}<p><b>Final Business Health:</b> ${t.lastRisk.finalScore} / 700</p></div><button class="btn bluebtn" onclick="nextRisk()">${t.risk<4?'Next Risk Card →':'Finish Simulation →'}</button></div>`; let risk=risks[t.risk];return `<div class="card pad"><span class="badge amber">Phase 2 · Risk Card ${risk.id} of 5</span><h2>⚠ ${risk.title}</h2><div class="box amber">${risk.narrative}</div><button class="btn amberbtn" onclick="revealRisk()">Reveal Risk Impact</button></div>`}
 return `<div class="card pad"><span class="badge green">Complete</span><h2>Simulation Complete</h2><p>${t.name} finished with <b>${score(t.visible||t.metrics)} / 700</b>.</p><button class="btn" onclick="exportReport()">Download Report</button></div>`}
function side(t){let lb=[...S.teams].sort((a,b)=>score(b.visible||b.metrics)-score(a.visible||a.metrics));return `${S.session.mode==='admin'?`<div class="card pad"><h3>Leaderboard</h3>${lb.map((x,i)=>`<div class="item" onclick="S.active='${x.id}';render()"><div class="row"><b>${i+1}. ${x.name}</b><b>${score(x.visible||x.metrics)}</b></div><div class="small muted">${x.code} · Rounds ${x.decisions.length}/7 · Risks ${x.riskHist.length}/5</div></div>`).join('')}</div>`:''}<div class="card pad"><h3>Strategic Assets</h3>${(S.session.mode==='admin'||t.phase1)&&t.assets.length?t.assets.map(a=>`<span class="badge" style="margin:3px">${a}</span>`).join(''):'<p class="muted small">Hidden until Phase 1 is complete.</p>'}</div><div class="card pad"><h3>Roles</h3><div class="grid g2">${['CEO','Finance Head','Sales Head','Operations Head','Technology Head','HR Head','Marketing Head'].map(r=>`<div class="box">${r}</div>`).join('')}</div></div><div class="card pad dark"><h3>Flow</h3><ol class="small muted"><li>Choose decisions.</li><li>Use Next Round after each choice.</li><li>Reveal all long-term impacts.</li><li>Start Phase 2.</li><li>Reveal risk impact, then Next Risk Card.</li></ol></div>`}
function history(t){return `<div class="grid g2"><div class="card pad"><h3>Impact History</h3><div class="list">${t.hist.filter(h=>S.session.mode==='admin'||h.type!=='Immediate').map(h=>`<div class="item"><span class="badge">${h.type}</span><b style="float:right">Score: ${h.score}</b><h4>${h.label}</h4><p>${fmt(h.impact)||'No score change'}</p><p class="muted small">${h.explain}</p></div>`).join('')||'<p class="muted">No visible history yet.</p>'}</div></div><div class="card pad"><h3>Risk History</h3>${t.riskHist.map(r=>`<div class="item"><b>${r.title}</b><p>Default: ${fmt(r.def)}</p>${r.triggered.length?r.triggered.map(p=>`<div class="box green"><b>${p.asset}</b>: ${p.note}</div>`).join(''):'<div class="box red">No protection activated.</div>'}<b>Score: ${r.finalScore}</b></div>`).join('')||'<p class="muted">Risk cards appear in Phase 2.</p>'}</div></div>`}
function analytics(t){let m=t.visible||(S.session.mode==='admin'?t.metrics:null);if(!m)return `<div class="card pad">Analytics unlock after Phase 1.</div>`;return `<div class="card pad"><h3>Current Metrics</h3><div class="grid g4">${metrics.map(k=>`<div class="metric"><div class="row"><span>${short[k]}</span><b>${m[k]}</b></div><div class="bar"><div class="fill" style="width:${m[k]}%"></div></div></div>`).join('')}</div><h3>Score Progression</h3>${t.trend.map(x=>`<span class="badge" style="margin:3px">${x.label}: ${x.score}</span>`).join('')||'<p class="muted">No revealed score yet.</p>'}</div>`}
function admin(t){return `<div class="card pad"><div class="row"><h3>Admin Console</h3><button class="btn light" onclick="S.revealAdmin=!S.revealAdmin;render()">${S.revealAdmin?'Hide':'Reveal'} Hidden Impacts</button></div><div class="grid g2">${S.teams.map(x=>`<div class="item"><div class="row"><div><b>${x.name}</b><div class="small muted">Code: ${x.code}</div></div><b>${score(x.visible||x.metrics)}</b></div><p class="small muted">Rounds ${x.decisions.length}/7 · LT ${x.delays.filter(d=>d.applied).length}/7 · Risks ${x.riskHist.length}/5</p>${S.revealAdmin?x.decisions.map(d=>`<div class="box"><b>R${d.round} ${d.title}</b><br>Immediate: ${fmt(d.immediate)}<br>Delayed: ${fmt(d.delayed)||'No score change'}</div>`).join(''):''}</div>`).join('')}</div></div>`}
function report(t){let list=S.session.mode==='admin'?[...S.teams].sort((a,b)=>score(b.visible||b.metrics)-score(a.visible||a.metrics)):[t];return `<div class="card pad"><h3>Report</h3>${list.map((x,i)=>`<div class="item"><div class="row"><h3>${S.session.mode==='admin'?`#${i+1} `:''}${x.name}</h3><div class="score">${score(x.visible||x.metrics)}</div></div><p class="muted small">Compounding works both ways: strategic assets reduce downside, strategic debt amplifies risk.</p></div>`).join('')}<button class="btn" onclick="exportReport()">Download Complete Report</button></div>`}
function loginScreen(){app.innerHTML=`<div class="login"><div class="wrap"><div style="text-align:center;margin-bottom:36px"><span class="badge blue">Business Strategy Simulation</span><h1 style="font-size:52px">Startup Strategy Simulation</h1><p>Team-wise login and admin-controlled simulation.</p></div><div class="grid g2"><div class="card pad"><h2>Team Login</h2><input id="code" class="input" placeholder="ALPHA" onkeydown="if(event.key==='Enter')login('team')"><button class="btn bluebtn" style="width:100%;margin-top:12px" onclick="login('team')">Enter Team App</button><p class="small">Default: ALPHA, BETA</p></div><div class="card pad"><h2>Admin Login</h2><input id="pin" type="password" class="input" placeholder="Admin PIN" onkeydown="if(event.key==='Enter')login('admin')"><button class="btn greenbtn" style="width:100%;margin-top:12px" onclick="login('admin')">Enter Admin App</button><p class="small">Default: ADMIN2026</p></div></div>${S.error?`<div class="box red" style="max-width:520px;margin:18px auto;text-align:center">${S.error}</div>`:''}</div></div>`}
function render(){if(!S.session)return loginScreen();let t=appTeam(),tabs=['play','analytics','history','admin','report'];app.innerHTML=`<div class="hero"><div class="wrap row"><div><span class="badge blue">${S.session.mode==='admin'?'Admin App':'Team App'}</span> <span class="badge green">Restored Risk Flow</span><h1>Startup Strategy Simulation</h1><p>Strategic decisions, long-term compounding and risk cards.</p></div><div><button class="btn light" onclick="exportHTML()">Export HTML</button> <button class="btn light" onclick="exportReport()">Export Report</button> <button class="btn light" onclick="logout()">Logout</button></div></div></div><div class="layout wrap"> <main>${S.session.mode==='admin'?`<div class="card pad row" style="margin-bottom:18px"><div><select class="select" onchange="S.active=this.value;render()">${S.teams.map(x=>`<option value="${x.id}" ${x.id===t.id?'selected':''}>${x.name} · ${x.code}</option>`).join('')}</select> <input id="newTeam" class="input" placeholder="Add team name"> <button class="btn" onclick="addTeam()">Add Team</button></div><button class="btn light" onclick="reset()">Reset</button></div>`:''}${dashboard(t)}<div style="height:16px"></div><div class="tabs">${tabs.map(x=>`<div class="tab ${S.tab===x?'on':''} ${x==='admin'&&S.session.mode!=='admin'?'hide':''}" onclick="S.tab='${x}';render()">${x==='admin'?'Admin':x[0].toUpperCase()+x.slice(1)}</div>`).join('')}</div>${S.tab==='play'?play(t):S.tab==='analytics'?analytics(t):S.tab==='history'?history(t):S.tab==='admin'?admin(t):report(t)}</main><aside>${side(t)}</aside></div>`}
render();
</script></body></html>
