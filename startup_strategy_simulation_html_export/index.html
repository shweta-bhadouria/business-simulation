<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startup Strategy Simulation Game</title>
  <style>
    :root{
      --slate-950:#020617;--slate-900:#0f172a;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;--slate-500:#64748b;--slate-200:#e2e8f0;--slate-100:#f1f5f9;--slate-50:#f8fafc;
      --blue:#2563eb;--blue-50:#eff6ff;--blue-100:#dbeafe;--blue-700:#1d4ed8;--emerald:#059669;--emerald-50:#ecfdf5;--emerald-100:#d1fae5;--amber:#d97706;--amber-50:#fffbeb;--amber-100:#fef3c7;--rose:#e11d48;--rose-50:#fff1f2;--purple-100:#f3e8ff;--purple-800:#6b21a8;
    }
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--slate-50);color:var(--slate-900)}
    .hero{background:linear-gradient(135deg,var(--slate-950),var(--slate-900),#172554);color:white;padding:28px 24px}.container{max-width:1280px;margin:0 auto}.hero-row{display:flex;justify-content:space-between;gap:24px;align-items:center;flex-wrap:wrap}.hero h1{font-size:42px;line-height:1.05;margin:10px 0}.hero p{color:#cbd5e1;max-width:820px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;border:1px solid transparent}.badge.blue{background:rgba(37,99,235,.18);border-color:rgba(147,197,253,.32);color:#dbeafe}.badge.green{background:rgba(5,150,105,.15);border-color:rgba(110,231,183,.28);color:#d1fae5}.badge.gray{background:var(--slate-100);color:var(--slate-700)}.badge.amber{background:var(--amber-100);color:#92400e}.badge.purple{background:var(--purple-100);color:var(--purple-800)}.badge.rose{background:var(--rose-50);color:#9f1239}
    .main{padding:24px}.grid{display:grid;gap:20px}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.layout{display:grid;grid-template-columns:1.7fr 1fr;gap:24px}.card{background:white;border:1px solid var(--slate-200);border-radius:22px;box-shadow:0 2px 10px rgba(15,23,42,.04);overflow:hidden}.card.dark{background:var(--slate-950);color:white}.card-content{padding:22px}.card-header{padding:20px 22px;border-bottom:1px solid var(--slate-200);background:white}.muted{color:var(--slate-600)}.small{font-size:13px}.tiny{font-size:12px}.btn{border:0;background:var(--slate-900);color:white;font-weight:700;padding:11px 15px;border-radius:14px;cursor:pointer;display:inline-flex;align-items:center;gap:8px}.btn:hover{filter:brightness(.95)}.btn.secondary{background:white;color:var(--slate-900);border:1px solid var(--slate-200)}.btn.blue{background:var(--blue)}.btn.green{background:var(--emerald)}.btn.amber{background:var(--amber)}.input,.select{height:42px;border:1px solid var(--slate-200);border-radius:12px;padding:0 12px;background:white;min-width:180px}.login{min-height:100vh;background:linear-gradient(135deg,var(--slate-950),var(--slate-900),#172554);padding:42px 24px;color:white}.login .card{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.14);color:white}.login .input{width:100%;margin-top:18px}.tabs{display:flex;gap:8px;background:var(--slate-200);padding:5px;border-radius:18px;margin-bottom:16px}.tab{flex:1;text-align:center;padding:10px;border-radius:14px;cursor:pointer;font-weight:700;color:var(--slate-700)}.tab.active{background:white;color:var(--slate-950);box-shadow:0 1px 4px rgba(15,23,42,.08)}.hidden{display:none!important}.metric-card{border:1px solid var(--slate-200);border-radius:18px;padding:15px}.metric-top{display:flex;justify-content:space-between;gap:10px}.bar-bg{height:8px;background:var(--slate-100);border-radius:999px;margin-top:12px;overflow:hidden}.bar-fill{height:100%;border-radius:999px}.kpi{padding:18px;border-radius:20px;border:1px solid}.kpi.good{background:var(--emerald-50);border-color:#a7f3d0;color:#065f46}.kpi.mid{background:var(--blue-50);border-color:#bfdbfe;color:#1e40af}.kpi.warn{background:var(--amber-50);border-color:#fde68a;color:#92400e}.kpi.bad{background:var(--rose-50);border-color:#fecdd3;color:#9f1239}.option{transition:.18s}.option:hover{transform:translateY(-3px);border-color:#93c5fd}.option.selected{border-color:var(--blue);background:var(--blue-50)}.round-note{background:var(--slate-100);border-radius:18px;padding:14px}.impact-box{border-radius:16px;padding:14px;margin-top:12px}.impact-box.green{background:var(--emerald-50);border:1px solid #a7f3d0}.impact-box.amber{background:var(--amber-50);border:1px solid #fde68a}.impact-box.blue{background:var(--blue-50);border:1px solid #bfdbfe}.impact-box.rose{background:var(--rose-50);border:1px solid #fecdd3}.history-list{max-height:460px;overflow:auto;padding-right:6px}.history-item{border:1px solid var(--slate-200);border-radius:16px;padding:14px;margin-bottom:10px;background:white}.leader{cursor:pointer;border:1px solid var(--slate-200);border-radius:16px;padding:14px;margin-bottom:10px;background:white}.leader.active{border-color:#93c5fd;background:var(--blue-50)}.role{background:var(--slate-100);border-radius:12px;padding:10px}.canvas-wrap{height:310px}.score-big{font-size:34px;font-weight:900}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}.pill{display:inline-block;border-radius:999px;padding:5px 9px;background:var(--slate-100);font-size:12px;font-weight:800}.danger{color:var(--rose)}.success{color:var(--emerald)}
    @media (max-width:960px){.layout,.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.hero h1{font-size:32px}.tabs{overflow:auto}.tab{min-width:110px}}
  </style>
</head>
<body>
  <div id="app"></div>

<script>
const ADMIN_PIN = 'ADMIN2026';
const METRICS = [
  { key:'cash', label:'Cash Position', short:'Cash' }, { key:'revenue', label:'Revenue Growth', short:'Revenue' }, { key:'customer', label:'Customer Satisfaction', short:'Customer' }, { key:'morale', label:'Team Morale', short:'Morale' }, { key:'brand', label:'Brand Reputation', short:'Brand' }, { key:'compliance', label:'Compliance & Governance', short:'Compliance' }, { key:'future', label:'Future Readiness', short:'Future' }
];
const initialMetrics = { cash:75, revenue:75, customer:75, morale:75, brand:75, compliance:75, future:75 };
const rounds = [
 { id:1,title:'Market Risk & Product Fitment',scenario:'A well-funded competitor has entered the market with aggressive pricing. Lead conversions have dropped, customers are demanding discounts and your sales team is pushing for immediate price reductions.',options:[
  {id:'A',title:'Reduce Pricing',decision:'Match competitor pricing to retain customers.',immediate:{cash:-10,revenue:12,customer:5,brand:-3},asset:'Pricing Pressure',delayed:{revenue:-5},explanation:'Discounting protects short-term revenue but trains the market to expect lower pricing.'},
  {id:'B',title:'Launch Premium Offering',decision:'Differentiate through premium service and quality.',immediate:{cash:-8,revenue:6,customer:-5,brand:10},asset:'Premium Brand',delayed:{brand:5},explanation:'Premium positioning compounds as customers associate the company with quality and trust.'},
  {id:'C',title:'Invest in Customer Experience',decision:'Improve onboarding, service and customer support.',immediate:{cash:-8,revenue:2,customer:12,brand:6},asset:'Customer Trust',delayed:{customer:5},explanation:'Better customer experience improves retention, referrals and confidence over time.'}
 ]},
 { id:2,title:'Cash Flow & Going Concern',scenario:'Customer collections have slowed considerably. Sales remain healthy, but cash reserves are reducing rapidly.',options:[
  {id:'A',title:'Working Capital Loan',decision:'Borrow funds to continue growth.',immediate:{cash:15,revenue:6,brand:-2},asset:'Working Capital Loan',delayed:{cash:-10},explanation:'Borrowing allows growth now, but repayment reduces future flexibility.'},
  {id:'B',title:'Slow Expansion',decision:'Delay expansion to preserve cash.',immediate:{cash:10,revenue:-5,compliance:4},asset:'Financial Discipline',delayed:{cash:5},explanation:'Disciplined expansion creates resilience when the market becomes uncertain.'},
  {id:'C',title:'Delay Technology Investment',decision:'Preserve cash by postponing technology upgrades.',immediate:{cash:12,future:-12},asset:'Technology Debt',delayed:{future:-5},explanation:'Deferred technology work quietly compounds into slower execution and reduced readiness.'}
 ]},
 { id:3,title:'Reputation Risk',scenario:'A dissatisfied customer posts a complaint on social media that rapidly gains attention.',options:[
  {id:'A',title:'Public Apology & Compensation',decision:'Publicly acknowledge the mistake and compensate the customer.',immediate:{cash:-6,customer:10,brand:12},asset:'Customer Confidence',delayed:{brand:3,customer:3},explanation:'Owning the issue visibly strengthens customer confidence and brand trust.'},
  {id:'B',title:'Resolve Privately',decision:'Resolve directly with the customer without public communication.',immediate:{customer:8,brand:-3},asset:'Media Doubt',delayed:{brand:-3},explanation:'Private resolution may fix the immediate customer issue but leaves public uncertainty unresolved.'},
  {id:'C',title:'Leadership Communication',decision:'Founder openly communicates corrective actions.',immediate:{brand:8,morale:8},asset:'Trusted Leadership',delayed:{morale:5},explanation:'Transparent leadership calms teams and stakeholders during ambiguity.'}
 ]},
 { id:4,title:'Technology & Knowledge Upgradation',scenario:'Competitors are adopting AI and automation. Budget allows only one strategic investment.',options:[
  {id:'A',title:'Invest in Technology',decision:'Upgrade AI and automation.',immediate:{cash:-12,revenue:3,future:18},asset:'Digital Advantage',delayed:{revenue:5},explanation:'Technology capability improves productivity and opens future revenue opportunities.'},
  {id:'B',title:'Invest in Employee Learning',decision:'Upskill employees.',immediate:{cash:-8,morale:10,future:12},asset:'Learning Culture',delayed:{morale:5,future:5},explanation:'A learning culture compounds because people keep adapting after the investment is made.'},
  {id:'C',title:'Balanced Investment',decision:'Invest moderately in both.',immediate:{cash:-10,revenue:3,morale:5,future:8},asset:'Balanced Capability',delayed:{future:3},explanation:'Balanced investment avoids overconcentration and creates moderate capability across technology and people.'}
 ]},
 { id:5,title:'Compliance & Governance',scenario:'A surprise regulatory audit identifies governance gaps.',options:[
  {id:'A',title:'Strong Governance',decision:'Invest in governance systems and SOPs.',immediate:{cash:-10,brand:5,compliance:18},asset:'Audit Ready',delayed:{compliance:5},explanation:'Strong governance is expensive upfront but protects the organization from future shocks.'},
  {id:'B',title:'Critical Fixes Only',decision:'Resolve only mandatory issues.',immediate:{cash:-4,compliance:7},asset:'Critical Fixes',delayed:{},explanation:'Minimum fixes reduce immediate risk but do not create a durable strategic advantage.'},
  {id:'C',title:'Growth First',decision:'Continue prioritising business growth.',immediate:{revenue:12,compliance:-15},asset:'Governance Debt',delayed:{brand:-5},explanation:'Ignoring governance may boost growth, but hidden governance debt erodes trust.'}
 ]},
 { id:6,title:'External Stakeholder Management',scenario:'A partner generating 35% of your business demands exclusivity.',options:[
  {id:'A',title:'Accept Exclusivity',decision:'Accept their terms.',immediate:{cash:5,revenue:12,brand:-2},asset:'Dependency Risk',delayed:{revenue:3},explanation:'Exclusivity improves near-term revenue but increases dependence on one stakeholder.'},
  {id:'B',title:'Diversify Partners',decision:'Build additional partners.',immediate:{revenue:-5,brand:6,future:8},asset:'Business Resilience',delayed:{revenue:3},explanation:'Diversification may hurt short-term momentum but builds resilience into the business model.'},
  {id:'C',title:'Negotiate',decision:'Reach a balanced agreement.',immediate:{cash:2,revenue:5,brand:5},asset:'Relationship Builder',delayed:{brand:3},explanation:'Balanced stakeholder management strengthens relationships without fully surrendering strategic control.'}
 ]},
 { id:7,title:'Leadership & Emotional Management',scenario:'Your highest-performing employee resigns unexpectedly.',options:[
  {id:'A',title:'Retention Bonus',decision:'Increase compensation for key employees.',immediate:{cash:-8,customer:5,morale:12},asset:'High Fixed Cost',delayed:{cash:-5},explanation:'Retention spending stabilizes the team now but increases fixed cost pressure.'},
  {id:'B',title:'Hire Quickly',decision:'Recruit replacements immediately.',immediate:{revenue:5,future:5,morale:-3},asset:'Talent Pipeline',delayed:{revenue:5},explanation:'Fast hiring maintains execution velocity but may create morale concerns if culture is not addressed.'},
  {id:'C',title:'Leadership Development',decision:'Build leaders and strengthen culture.',immediate:{morale:10,brand:6,future:8},asset:'High Trust Culture',delayed:{morale:5,brand:3},explanation:'Leadership development compounds through trust, ownership and reduced key-person dependency.'}
 ]}
];
const riskCards = [
 {id:1,title:'Industry Rumour',narrative:'A fake message claims your company is shutting down.',defaultImpact:{revenue:-8,brand:-12,morale:-5},protections:[{asset:'Premium Brand',impact:{brand:7},note:'Premium Brand reduces reputational damage because customers already associate the company with credibility.'},{asset:'Customer Trust',impact:{revenue:5},note:'Customer Trust reduces revenue loss because customers are less likely to churn during rumours.'},{asset:'Trusted Leadership',impact:{morale:5},note:'Trusted Leadership protects morale because teams believe management will address ambiguity.'}]},
 {id:2,title:'AI Disruption',narrative:'Competitors launch AI-powered services.',defaultImpact:{future:-12,revenue:-6},protections:[{asset:'Digital Advantage',impact:{future:12,revenue:11},note:'Digital Advantage neutralizes the readiness penalty and creates a revenue upside.'},{asset:'Learning Culture',impact:{future:7},note:'Learning Culture reduces the future readiness penalty because people adapt faster.'},{asset:'Balanced Capability',impact:{future:6,revenue:3},note:'Balanced Capability halves the disruption because the firm invested in both tools and people.'}]},
 {id:3,title:'Economic Slowdown',narrative:'Customer demand drops significantly.',defaultImpact:{cash:-10,revenue:-10},protections:[{asset:'Financial Discipline',impact:{cash:10,revenue:5},note:'Financial Discipline protects cash and reduces revenue loss because the company preserved flexibility.'},{asset:'Working Capital Loan',impact:{cash:-5},note:'Working Capital Loan adds repayment stress during a downturn.'}]},
 {id:4,title:'Surprise Regulatory Inspection',narrative:'Authorities conduct an inspection.',defaultImpact:{compliance:-15,brand:-6},protections:[{asset:'Audit Ready',impact:{compliance:15,brand:11},note:'Audit Ready neutralizes the compliance penalty and turns governance into brand strength.'},{asset:'Critical Fixes',impact:{compliance:8},note:'Critical Fixes reduce but do not eliminate compliance loss.'},{asset:'Governance Debt',impact:{compliance:-8,brand:-5},note:'Governance Debt increases both compliance and brand penalties.'}]},
 {id:5,title:'Major Partner Exit',narrative:'Largest referral partner exits.',defaultImpact:{revenue:-12,cash:-5},protections:[{asset:'Business Resilience',impact:{revenue:11,cash:4},note:'Business Resilience makes the partner exit almost immaterial because revenue is diversified.'},{asset:'Relationship Builder',impact:{revenue:7},note:'Relationship Builder reduces revenue loss because alternative relationships can be activated.'},{asset:'Dependency Risk',impact:{revenue:-8},note:'Dependency Risk increases revenue loss because the business relied too heavily on one source.'}]}
];

const state = {
  teams:[createTeam('Team Alpha','ALPHA'), createTeam('Team Beta','BETA')],
  session:{mode:null,teamId:null}, activeAdminTeamId:null, tab:'play', loginError:'', selectedOption:null,
};
function clone(o){return JSON.parse(JSON.stringify(o));}
function pretty(k){return METRICS.find(m=>m.key===k)?.short||k}
function clamp(v){return Math.max(0,Math.min(100,v))}
function totalScore(m){return Object.values(m||{}).reduce((s,v)=>s+v,0)}
function impactText(impact={}){return Object.entries(impact).map(([k,v])=>`${pretty(k)} ${v>0?'+':''}${v}`).join(', ')}
function applyImpact(metrics, impact={}){const n={...metrics}; Object.entries(impact).forEach(([k,v])=>n[k]=clamp((n[k]??0)+v)); return n;}
function createTeam(name, code){return {id:crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random()),name,code,metrics:clone(initialMetrics),visibleMetrics:null,showDashboard:false,phase:1,roundIndex:0,riskIndex:0,decisions:[],assets:[],delayedQueue:[],impactHistory:[],riskHistory:[],trend:[],phase1Complete:false,delayedApplied:false,gameComplete:false,lastLongTermReveal:null,lastRiskReveal:null,pendingNext:false};}
function setVisibleSnapshot(team,label,metrics){team.visibleMetrics=clone(metrics); team.showDashboard=true; team.trend.push({step:label,score:totalScore(metrics),...clone(metrics)});}
function activeTeam(){const id=state.session.mode==='admin'?(state.activeAdminTeamId||state.teams[0]?.id):state.session.teamId; return state.teams.find(t=>t.id===id)||state.teams[0];}
function updateActive(mutator){const t=activeTeam(); mutator(t); render();}
function leaderboard(){return [...state.teams].sort((a,b)=>totalScore(b.visibleMetrics||b.metrics)-totalScore(a.visibleMetrics||a.metrics));}
function makeCode(name){let base=(name.replace(/[^a-zA-Z0-9]/g,'').slice(0,8).toUpperCase()||`TEAM${state.teams.length+1}`); let code=base,i=2; const codes=state.teams.map(t=>t.code); while(codes.includes(code)){code=`${base}${i++}`}; return code;}
function tone(score){if(score>=590)return'good'; if(score>=520)return'mid'; if(score>=450)return'warn'; return'bad'}
function metricColor(v){if(v>=80)return'#059669'; if(v>=60)return'#2563eb'; if(v>=40)return'#d97706'; return'#e11d48'}

function loginTeam(){const code=document.getElementById('teamCode').value.trim().toUpperCase(); const t=state.teams.find(x=>x.code.toUpperCase()===code); if(!t){state.loginError='Invalid team code. Please check with the facilitator.'; render(); return} state.loginError=''; state.session={mode:'team',teamId:t.id}; render();}
function loginAdmin(){const pin=document.getElementById('adminPin').value.trim(); if(pin!==ADMIN_PIN){state.loginError='Invalid admin PIN.'; render(); return} state.loginError=''; state.session={mode:'admin',teamId:null}; state.activeAdminTeamId=state.teams[0].id; render();}
function logout(){state.session={mode:null,teamId:null}; state.tab='play'; state.selectedOption=null; render();}
function addTeam(){const el=document.getElementById('newTeamName'); const name=el.value.trim()||`Team ${state.teams.length+1}`; const t=createTeam(name,makeCode(name)); state.teams.push(t); state.activeAdminTeamId=t.id; render();}
function resetGame(){state.teams=[createTeam('Team Alpha','ALPHA'),createTeam('Team Beta','BETA')]; state.session={mode:null,teamId:null}; state.activeAdminTeamId=null; state.tab='play'; render();}
function selectOption(optionId){state.selectedOption=optionId; render();}
function confirmDecision(){const t=activeTeam(); const round=rounds[t.roundIndex]; const option=round.options.find(o=>o.id===state.selectedOption); if(!option)return; const nextMetrics=applyImpact(t.metrics,option.immediate); t.metrics=nextMetrics; t.decisions.push({round:round.id,title:round.title,option:option.id,optionTitle:option.title,decision:option.decision,immediate:option.immediate,asset:option.asset,delayed:option.delayed,explanation:option.explanation}); t.assets.push(option.asset); t.delayedQueue.push({round:round.id,asset:option.asset,impact:option.delayed,explanation:option.explanation,applied:false}); t.impactHistory.push({type:'Immediate',label:`Round ${round.id}: ${option.title}`,impact:option.immediate,explanation:option.decision,score:totalScore(nextMetrics)}); t.pendingNext=true; state.selectedOption=null; render();}
function nextRound(){const t=activeTeam(); t.pendingNext=false; if(t.roundIndex<rounds.length-1){t.roundIndex++;} else {t.roundIndex=rounds.length; t.phase1Complete=true; setVisibleSnapshot(t,'After Phase 1',t.metrics);} render();}
function revealNextLongTerm(){const t=activeTeam(); const idx=t.delayedQueue.findIndex(d=>!d.applied); if(idx===-1)return; const item=t.delayedQueue[idx]; const before=clone(t.metrics); const after=applyImpact(t.metrics,item.impact); t.metrics=after; item.applied=true; const all=t.delayedQueue.every(d=>d.applied); t.delayedApplied=all; t.lastLongTermReveal={...clone(item),before,after,score:totalScore(after)}; t.impactHistory.push({type:'Long-Term',label:`Round ${item.round}: ${item.asset}`,impact:item.impact,explanation:item.explanation,score:totalScore(after)}); setVisibleSnapshot(t,`LT R${item.round}`,after); render();}
function startPhase2(){const t=activeTeam(); t.phase=2; t.lastLongTermReveal=null; render();}
function revealRisk(){const t=activeTeam(); if(t.phase!==2 || t.riskIndex>=riskCards.length)return; const card=riskCards[t.riskIndex]; const before=clone(t.metrics); let afterDefault=applyImpact(t.metrics,card.defaultImpact); let final=clone(afterDefault); const triggered=[]; card.protections.forEach(p=>{if(t.assets.includes(p.asset)){final=applyImpact(final,p.impact); triggered.push(p)}}); const record={title:card.title,narrative:card.narrative,defaultImpact:card.defaultImpact,triggered,afterDefault,finalScore:totalScore(final)}; t.metrics=final; t.riskHistory.push(record); t.lastRiskReveal={...record,before,final,cardId:card.id}; t.impactHistory.push({type:'Risk Card',label:card.title,impact:card.defaultImpact,explanation:triggered.length?`${triggered.length} resilience modifier(s) activated.`:'No resilience modifiers activated.',score:totalScore(final)}); setVisibleSnapshot(t,`Risk ${card.id}`,final); render();}
function nextRisk(){const t=activeTeam(); t.lastRiskReveal=null; if(t.riskIndex<riskCards.length-1){t.riskIndex++;} else {t.gameComplete=true;} render();}
function setTab(tab){state.tab=tab; render();}
function switchTeam(id){state.activeAdminTeamId=id; state.selectedOption=null; render();}
function exportReport(){const report=state.teams.map((team,i)=>{const selected=team.visibleMetrics||team.metrics; const sorted=Object.entries(selected).sort((a,b)=>b[1]-a[1]); return `# ${i+1}. ${team.name}\n\nTeam Login Code: ${team.code}\nLatest Business Health Score: ${totalScore(selected)} / 700\n\nStrategic Strengths: ${sorted.slice(0,3).map(([k,v])=>`${pretty(k)} (${v})`).join(', ')}\nStrategic Weaknesses: ${sorted.slice(-2).map(([k,v])=>`${pretty(k)} (${v})`).join(', ')}\n\nDecisions Made:\n${team.decisions.map(d=>`- Round ${d.round}: ${d.optionTitle} — ${d.decision}`).join('\n')||'Pending'}\n\nLong-Term Impacts Revealed:\n${team.delayedQueue.filter(d=>d.applied).map(d=>`- Round ${d.round}: ${d.asset}: ${impactText(d.impact)||'No score change'} — ${d.explanation}`).join('\n')||'Pending'}\n\nRisk Card Impacts:\n${team.riskHistory.map(r=>`- ${r.title}: Default ${impactText(r.defaultImpact)}; ${r.triggered.length?r.triggered.map(t=>`${t.asset} (${impactText(t.impact)})`).join('; '):'No protection activated'}`).join('\n')||'Pending'}\n\nKey Learning: Sustainable startup leadership is about balancing growth, cash, trust, governance, talent and future readiness.\n`;}).join('\n---\n\n'); download('startup-strategy-simulation-report.md', report, 'text/markdown');}
function download(filename, text, type='text/plain'){const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url)}
function exportHtml(){download('startup-strategy-simulation.html', document.documentElement.outerHTML, 'text/html')}

function renderLogin(){document.getElementById('app').innerHTML=`
  <div class="login"><div class="container"><div style="text-align:center;margin-bottom:38px"><span class="badge blue">Business Strategy Simulation</span><h1 style="font-size:54px;margin:14px 0 8px">Startup Strategy Simulation</h1><p style="color:#cbd5e1;max-width:760px;margin:auto">Team-wise login keeps scoring private. Admin login controls all teams and consolidated results.</p></div>
  <div class="grid grid-2"><div class="card"><div class="card-content"><h2>Team Login</h2><p class="small" style="color:#cbd5e1">Enter your team code.</p><input id="teamCode" class="input" placeholder="Example: ALPHA" onkeydown="if(event.key==='Enter')loginTeam()"><button class="btn blue" style="width:100%;margin-top:14px" onclick="loginTeam()">🔒 Enter Team App</button><p class="tiny" style="color:#cbd5e1">Default team codes: ALPHA, BETA</p></div></div>
  <div class="card"><div class="card-content"><h2>Admin / Facilitator Login</h2><p class="small" style="color:#cbd5e1">Create teams, monitor progress, reveal impact and export reports.</p><input id="adminPin" type="password" class="input" placeholder="Admin PIN" onkeydown="if(event.key==='Enter')loginAdmin()"><button class="btn green" style="width:100%;margin-top:14px" onclick="loginAdmin()">🛡 Enter Admin App</button><p class="tiny" style="color:#cbd5e1">Default admin PIN: ADMIN2026</p></div></div></div>${state.loginError?`<div class="impact-box rose" style="max-width:620px;margin:20px auto;text-align:center">${state.loginError}</div>`:''}</div></div>`}
function renderDashboard(t, isAdmin){const metrics=t.visibleMetrics||(isAdmin?t.metrics:null); const show=isAdmin||(t.showDashboard&&t.visibleMetrics); if(!show||!metrics)return `<div class="card"><div class="card-content" style="text-align:center"><div style="font-size:34px">👁️‍🗨️</div><h2>Business Health Hidden</h2><p class="muted">Dashboard unlocks after Phase 1 is completed.</p></div></div>`; return `<div class="card"><div class="card-header row"><div><div class="small" style="color:var(--blue-700);font-weight:800">Active Team: ${t.name}</div><h2 style="margin:4px 0">Business Health Dashboard</h2><p class="muted small">Updated at reveal points only.</p></div><div class="kpi ${tone(totalScore(metrics))}"><div class="tiny" style="font-weight:800">OVERALL BUSINESS HEALTH</div><div class="score-big">${totalScore(metrics)} <span style="font-size:16px">/ 700</span></div></div></div><div class="card-content grid grid-4">${METRICS.map(m=>{const v=metrics[m.key]; return `<div class="metric-card"><div class="metric-top"><span class="small muted">${m.label}</span><b>${v}</b></div><div class="bar-bg"><div class="bar-fill" style="width:${v}%;background:${metricColor(v)}"></div></div></div>`}).join('')}</div></div>`}
function renderPlay(t){const round=rounds[t.roundIndex]; if(!t.phase1Complete && round){if(t.pendingNext){const d=t.decisions[t.decisions.length-1]; return `<div class="card"><div class="card-content"><span class="badge blue">Round ${d.round} Decision Locked</span><h2>${d.optionTitle}</h2><p class="muted">${d.decision}</p><div class="impact-box blue"><b>Decision recorded.</b> The score impact will be revealed after all seven rounds are complete.</div><button class="btn blue" onclick="nextRound()">Next Round →</button></div></div>`} return `<div class="card"><div class="card-content"><div class="row"><span class="badge blue">Phase 1 · Round ${round.id} of 7</span><span class="badge gray">≈ 6 months</span></div><h2>${round.title}</h2><p class="round-note">${round.scenario}</p><div class="grid grid-3" style="margin-top:18px">${round.options.map(o=>`<div class="card option ${state.selectedOption===o.id?'selected':''}" onclick="selectOption('${o.id}')"><div class="card-content"><div class="row"><span class="badge gray">${o.id}</span><span class="tiny muted">Strategic Choice</span></div><h3>${o.title}</h3><p class="small muted">${o.decision}</p></div></div>`).join('')}</div><div class="row" style="margin-top:18px"><p class="small muted">Choose one option after team discussion.</p><button class="btn blue" onclick="confirmDecision()" ${!state.selectedOption?'disabled style="opacity:.5"':''}>Confirm Decision</button></div></div></div>`}
 if(t.phase1Complete && !t.delayedApplied){const pending=t.delayedQueue.find(d=>!d.applied); return `<div class="card"><div class="card-content"><span class="badge purple">End of Phase 1</span><h2>Compounding Consequences Reveal</h2><p class="muted">Business Health is now visible. Reveal long-term impacts in round order.</p>${t.lastLongTermReveal?`<div class="impact-box green"><h3>Revealed: Round ${t.lastLongTermReveal.round} — ${t.lastLongTermReveal.asset}</h3><p><b>Impact:</b> ${impactText(t.lastLongTermReveal.impact)||'No score change'}</p><p>${t.lastLongTermReveal.explanation}</p><p><b>Updated Business Health:</b> ${t.lastLongTermReveal.score} / 700</p></div>`:''}<div class="history-list">${t.delayedQueue.map(d=>`<div class="history-item"><div class="row"><b>Round ${d.round}: ${d.asset}</b>${d.applied?'<span class="success">✓ Applied</span>':'<span class="pill">Pending</span>'}</div>${d.applied?`<p class="small"><b>Impact:</b> ${impactText(d.impact)||'No score change'}</p><p class="small muted">${d.explanation}</p>`:''}</div>`).join('')}</div>${pending?`<button class="btn green" onclick="revealNextLongTerm()">Reveal Next Long-Term Impact</button>`:`<button class="btn blue" onclick="startPhase2()">Next: Start Phase 2 →</button>`}</div></div>`}
 if(t.phase===2 && !t.gameComplete){if(t.lastRiskReveal){return `<div class="card"><div class="card-content"><span class="badge amber">Risk Impact Revealed</span><h2>${t.lastRiskReveal.title}</h2><p class="muted">${t.lastRiskReveal.narrative}</p><div class="impact-box amber"><p><b>Default impact:</b> ${impactText(t.lastRiskReveal.defaultImpact)}</p><p><b>Updated after default:</b> ${totalScore(t.lastRiskReveal.afterDefault)} / 700</p></div><div class="impact-box ${t.lastRiskReveal.triggered.length?'green':'rose'}"><h3>Resilience Check</h3>${t.lastRiskReveal.triggered.length?t.lastRiskReveal.triggered.map(p=>`<p><b>${p.asset}</b>: ${impactText(p.impact)} — ${p.note}</p>`).join(''):'<p>No protection activated. The team absorbed the full shock.</p>'}<p><b>Final Business Health:</b> ${t.lastRiskReveal.finalScore} / 700</p></div><button class="btn blue" onclick="nextRisk()">${t.riskIndex<riskCards.length-1?'Next Risk Card →':'Finish Simulation →'}</button></div></div>`} const r=riskCards[t.riskIndex]; return `<div class="card"><div class="card-content"><span class="badge amber">Phase 2 · Risk Card ${r.id} of 5</span><h2>⚠ ${r.title}</h2><p class="impact-box amber">${r.narrative}</p><button class="btn amber" onclick="revealRisk()">Reveal Risk Impact</button></div></div>`}
 return `<div class="card"><div class="card-content"><span class="badge green">Complete</span><h2>Simulation Complete</h2><p>${t.name} finished with <b>${totalScore(t.visibleMetrics||t.metrics)} / 700</b>.</p><button class="btn" onclick="exportReport()">Download Report</button></div></div>`}
function renderAnalytics(t){const m=t.visibleMetrics||(state.session.mode==='admin'?t.metrics:null); if(!m)return `<div class="card"><div class="card-content">Analytics unlock after Phase 1.</div></div>`; setTimeout(()=>{drawRadar('radar',m); drawTrend('trend',t.trend); drawBars('bars',m)},0); return `<div class="grid grid-2"><div class="card"><div class="card-content"><h3>Capability Radar</h3><canvas id="radar" width="420" height="300"></canvas></div></div><div class="card"><div class="card-content"><h3>Score Progression</h3><canvas id="trend" width="420" height="300"></canvas></div></div><div class="card" style="grid-column:1/-1"><div class="card-content"><h3>Current Metrics</h3><canvas id="bars" width="900" height="280"></canvas></div></div></div>`}
function drawRadar(id,m){const c=document.getElementById(id); if(!c)return; const ctx=c.getContext('2d'), w=c.width,h=c.height,cx=w/2,cy=h/2+10,R=105; ctx.clearRect(0,0,w,h); ctx.strokeStyle='#cbd5e1'; ctx.fillStyle='#475569'; ctx.font='12px sans-serif'; for(let r=1;r<=4;r++){ctx.beginPath(); METRICS.forEach((x,i)=>{const a=-Math.PI/2+i*2*Math.PI/METRICS.length; const rr=R*r/4; const px=cx+Math.cos(a)*rr,py=cy+Math.sin(a)*rr; i?ctx.lineTo(px,py):ctx.moveTo(px,py)}); ctx.closePath(); ctx.stroke()} const pts=METRICS.map((x,i)=>{const a=-Math.PI/2+i*2*Math.PI/METRICS.length, rr=R*(m[x.key]/100); return [cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,a,x.short]}); ctx.beginPath(); pts.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1])); ctx.closePath(); ctx.fillStyle='rgba(37,99,235,.25)'; ctx.fill(); ctx.strokeStyle='#2563eb'; ctx.lineWidth=2; ctx.stroke(); pts.forEach(p=>{ctx.fillStyle='#334155'; ctx.fillText(p[3],cx+Math.cos(p[2])*(R+25)-18,cy+Math.sin(p[2])*(R+25)+4)})}
function drawTrend(id,trend){const c=document.getElementById(id); if(!c)return; const ctx=c.getContext('2d'), w=c.width,h=c.height,p=42; ctx.clearRect(0,0,w,h); ctx.strokeStyle='#e2e8f0'; ctx.beginPath(); ctx.moveTo(p,20); ctx.lineTo(p,h-p); ctx.lineTo(w-20,h-p); ctx.stroke(); if(!trend.length)return; const max=700,min=300; const pts=trend.map((d,i)=>[p+i*((w-p-30)/Math.max(1,trend.length-1)), h-p-((d.score-min)/(max-min))*(h-p-25)]); ctx.strokeStyle='#0f172a'; ctx.lineWidth=3; ctx.beginPath(); pts.forEach((pt,i)=>i?ctx.lineTo(pt[0],pt[1]):ctx.moveTo(pt[0],pt[1])); ctx.stroke(); ctx.fillStyle='#2563eb'; pts.forEach(pt=>{ctx.beginPath();ctx.arc(pt[0],pt[1],4,0,Math.PI*2);ctx.fill()}); ctx.fillStyle='#64748b'; ctx.font='11px sans-serif'; trend.forEach((d,i)=>{if(trend.length<=8)ctx.fillText(d.step,pts[i][0]-15,h-10)})}
function drawBars(id,m){const c=document.getElementById(id); if(!c)return; const ctx=c.getContext('2d'), w=c.width,h=c.height,p=40; ctx.clearRect(0,0,w,h); const barW=(w-p-20)/METRICS.length-12; METRICS.forEach((x,i)=>{const v=m[x.key], bh=(v/100)*(h-p-30), x0=p+i*(barW+12), y=h-p-bh; ctx.fillStyle='#2563eb'; ctx.fillRect(x0,y,barW,bh); ctx.fillStyle='#334155'; ctx.font='12px sans-serif'; ctx.fillText(x.short,x0,h-12); ctx.fillText(v,x0+barW/3,y-6)})}
function renderHistory(t){return `<div class="grid grid-2"><div class="card"><div class="card-content"><h3>Visible Impact History</h3><div class="history-list">${t.impactHistory.filter(h=>state.session.mode==='admin'||h.type!=='Immediate').map(h=>`<div class="history-item"><div class="row"><span class="badge gray">${h.type}</span><b>Score: ${h.score}</b></div><b>${h.label}</b><p class="small">${impactText(h.impact)||'No score change'}</p><p class="small muted">${h.explanation}</p></div>`).join('')||'<p class="muted">No visible history yet.</p>'}</div></div></div><div class="card"><div class="card-content"><h3>Risk Card History</h3><div class="history-list">${t.riskHistory.map(r=>`<div class="history-item"><b>${r.title}</b><p class="small">Default: ${impactText(r.defaultImpact)}</p>${r.triggered.length?r.triggered.map(p=>`<div class="impact-box green"><b>${p.asset}</b>: ${p.note}</div>`).join(''):'<div class="impact-box rose">No protection activated.</div>'}<p><b>Score after card:</b> ${r.finalScore}</p></div>`).join('')||'<p class="muted">Risk cards will appear in Phase 2.</p>'}</div></div></div></div>`}
function renderAdmin(){return `<div class="card"><div class="card-content"><div class="row"><div><h3>Admin Console</h3><p class="muted small">All team results, login codes and hidden impacts.</p></div><button class="btn secondary" onclick="state.reveal=!state.reveal;render()">${state.reveal?'Hide':'Reveal'} Hidden Impacts</button></div><div class="grid grid-2" style="margin-top:16px">${state.teams.map(t=>`<div class="history-item"><div class="row"><div><b>${t.name}</b><div class="small muted">Code: ${t.code}</div></div><div class="score-big" style="font-size:24px">${totalScore(t.visibleMetrics||t.metrics)}</div></div><p class="small muted">Rounds ${t.decisions.length}/7 · LT ${t.delayedQueue.filter(d=>d.applied).length}/7 · Risks ${t.riskHistory.length}/5</p>${state.reveal?t.decisions.map(d=>`<div class="impact-box blue"><b>R${d.round} ${d.optionTitle}</b><br>Immediate: ${impactText(d.immediate)}<br>Asset/Debt: ${d.asset}; Delayed: ${impactText(d.delayed)||'No score change'}</div>`).join(''):''}</div>`).join('')}</div></div></div>`}
function renderReport(t){const list=state.session.mode==='admin'?leaderboard():[t]; return `<div class="card"><div class="card-content"><h3>Final Results & Learning Report</h3><p class="small muted">${state.session.mode==='admin'?'Admin view shows all teams.':'Team view shows your own revealed results.'}</p>${list.map((team,i)=>{const sel=team.visibleMetrics||team.metrics; const strengths=Object.entries(sel).sort((a,b)=>b[1]-a[1]).slice(0,3); const weaknesses=Object.entries(sel).sort((a,b)=>a[1]-b[1]).slice(0,2); return `<div class="history-item"><div class="row"><div><span class="badge ${i===0?'amber':'gray'}">${state.session.mode==='admin'?`Rank #${i+1}`:'Team Report'}</span><h3>${team.name}</h3></div><div class="score-big">${totalScore(sel)}</div></div><div class="grid grid-2"><div class="impact-box green"><b>Strategic strengths:</b> ${strengths.map(([k,v])=>`${pretty(k)} ${v}`).join(', ')}</div><div class="impact-box rose"><b>Strategic weaknesses:</b> ${weaknesses.map(([k,v])=>`${pretty(k)} ${v}`).join(', ')}</div></div><p class="small muted"><b>Key learning:</b> Trust, governance, learning and relationships compound into resilience.</p></div>`}).join('')}<button class="btn" onclick="exportReport()">Download Complete Report</button></div></div>`}
function renderSide(t){return `<div class="grid">${state.session.mode==='admin'?`<div class="card"><div class="card-content"><h3>🏆 Admin Leaderboard</h3>${leaderboard().map((team,i)=>`<div class="leader ${team.id===t.id?'active':''}" onclick="switchTeam('${team.id}')"><div class="row"><div><b>${i+1}. ${team.name}</b><div class="tiny muted">${team.code} · Rounds ${team.decisions.length}/7 · Risks ${team.riskHistory.length}/5</div></div><b>${totalScore(team.visibleMetrics||team.metrics)}</b></div></div>`).join('')}</div></div>`:''}<div class="card"><div class="card-content"><h3>Strategic Assets Built</h3><div>${(state.session.mode==='admin'||t.phase1Complete)&&t.assets.length?t.assets.map(a=>`<span class="badge gray" style="margin:3px">${a}</span>`).join(''):'<p class="small muted">Hidden until Phase 1 is complete.</p>'}</div></div></div><div class="card"><div class="card-content"><h3>Suggested Team Roles</h3><div class="grid grid-2">${['CEO','Finance Head','Sales Head','Operations Head','Technology Head','HR Head','Marketing Head'].map(r=>`<div class="role">${r}</div>`).join('')}</div></div></div><div class="card dark"><div class="card-content"><h3>Facilitation Rhythm</h3><ol class="small muted" style="color:#cbd5e1"><li>Teams login with team codes.</li><li>Phase 1 decisions remain unrevealed.</li><li>After Round 7, reveal Business Health.</li><li>Reveal long-term impacts one by one.</li><li>Reveal each risk card impact, then move next.</li><li>Export report from admin or team view.</li></ol></div></div></div>`}
function renderApp(){const t=activeTeam(); const tabs=['play','analytics','history','facilitator','report']; document.getElementById('app').innerHTML=`<div class="hero"><div class="container hero-row"><div><div><span class="badge blue">${state.session.mode==='admin'?'Admin App':'Team App'}</span> <span class="badge green">Startup Leadership</span></div><h1>Startup Strategy Simulation</h1><p>Run a startup through strategic decisions, compounding consequences and risk shocks.</p></div><div class="row"><button class="btn secondary" onclick="exportHtml()">Export HTML</button><button class="btn secondary" onclick="exportReport()">Export Report</button><button class="btn secondary" onclick="logout()">Logout</button></div></div></div><main class="main container">${state.session.mode==='admin'?`<div class="grid grid-2" style="margin-bottom:20px"><div class="card"><div class="card-content row"><div><select class="select" onchange="switchTeam(this.value)">${state.teams.map(x=>`<option value="${x.id}" ${x.id===t.id?'selected':''}>${x.name} · ${x.code}</option>`).join('')}</select> <input id="newTeamName" class="input" placeholder="Add team name"> <button class="btn" onclick="addTeam()">Add Team</button></div><button class="btn secondary" onclick="resetGame()">Reset</button></div></div><div class="card"><div class="card-content grid grid-3" style="text-align:center"><div><div class="tiny muted">Teams</div><b>${state.teams.length}</b></div><div><div class="tiny muted">Average</div><b>${Math.round(state.teams.reduce((s,x)=>s+totalScore(x.visibleMetrics||x.metrics),0)/state.teams.length)}</b></div><div><div class="tiny muted">Leader</div><b>${leaderboard()[0]?.name}</b></div></div></div></div>`:''}<div class="layout"><section class="grid">${renderDashboard(t,state.session.mode==='admin')}<div><div class="tabs">${tabs.map(tab=>`<div class="tab ${state.tab===tab?'active':''} ${tab==='facilitator'&&state.session.mode!=='admin'?'hidden':''}" onclick="setTab('${tab}')">${tab==='facilitator'?'Admin':tab[0].toUpperCase()+tab.slice(1)}</div>`).join('')}</div>${state.tab==='play'?renderPlay(t):state.tab==='analytics'?renderAnalytics(t):state.tab==='history'?renderHistory(t):state.tab==='facilitator'?renderAdmin():renderReport(t)}</div></section><aside>${renderSide(t)}</aside></div></main>`}
function render(){ if(!state.session.mode) renderLogin(); else renderApp(); }
render();
</script>
</body>
</html>
